      <stop offset="1" stop-color="#e64539"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#102033" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="280" rx="34" fill="#f7fafc"/>
  <path d="M0 210 C130 174 210 248 342 206 C462 168 548 110 668 148 C780 184 842 232 960 188 L960 280 L0 280 Z" fill="#e9f5ff"/>

