<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">AI Quality Pilot logo</title>
  <desc id="desc">A Hermes-inspired QA agent mark with a wing, lobster claw, check mark, and AI Quality Pilot wordmark.</desc>
  <defs>
    <linearGradient id="badgeGradient" x1="44" y1="24" x2="236" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6c5ce7"/>
      <stop offset="0.52" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="clawGradient" x1="78" y1="76" x2="208" y2="214" gradientUnits="userSpaceOnUse">
