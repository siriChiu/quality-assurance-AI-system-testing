    <path d="M96 132 L110 146 L136 116" fill="none" stroke="#0f8f7d" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M92 180 C119 194 149 194 176 180" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g transform="translate(292 74)">
    <text x="0" y="64" fill="#172033" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">AI Quality Pilot</text>
    <text x="2" y="108" fill="#43536a" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0">Hermes-first AI agent for software QA and testing</text>
    <g transform="translate(2 140)">
