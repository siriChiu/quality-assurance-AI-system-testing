    <path d="M107 61 C148 48 187 74 190 114 C192 139 178 158 155 166 C143 170 131 170 120 166 L139 143 C145 146 151 146 157 144 C170 139 177 126 174 111 C171 92 153 80 133 84 C115 88 102 104 101 124 C100 142 110 157 126 165 L109 186 C87 172 74 149 77 121 C80 92 91 72 107 61 Z" fill="url(#clawGradient)"/>
    <path d="M128 88 C143 83 158 90 164 104 C153 101 141 103 131 111 C122 119 118 130 120 143 C108 132 108 99 128 88 Z" fill="#ffb199"/>
    <path d="M136 123 L154 105 C159 100 167 101 171 106 C175 111 174 119 169 123 L137 155 L115 134 L125 124 L136 123 Z" fill="#102033" opacity="0.2"/>

